skill_id = "discord-project-curate"
version = "0.1.0"
display_name = "Discord Project Curate"
description = "on_event skill: turn a Discord channel message into project belief writes + an episode append (the agent's memory)."
entry_flow = "discord_project_curate"
required_capabilities = []
timeout_ms = 60000
token_limit = 8192
side_effect_policy = "sandboxed"

# The apxm-os curate ABI: one JSON-encoded { event, agent_context } envelope in,
# a CurationResult out under the `curation` token.
artifact_hash = "blake3:b2d529812f7cb7445f0f78f8989b65c21853abaad0f4f4cc6e46def14b6d5d8a"
[[inputs]]
name = "payload"
type = "string"
description = "JSON-encoded { event, agent_context } envelope from apxm-os."
required = true

[[outputs]]
name = "curation"
type = "json"
description = "CurationResult: { belief_writes: [{key,value}], episode_appends: [{event_type,payload}] }."
