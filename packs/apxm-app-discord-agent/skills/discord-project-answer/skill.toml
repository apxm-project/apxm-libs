skill_id = "discord-project-answer"
version = "0.1.0"
display_name = "Discord Project Answer"
description = "answer skill: respond to a question grounded in the project's accumulated beliefs (prompt-only — the rendered answer is the LLM content)."
entry_flow = "discord_project_answer"
required_capabilities = []
timeout_ms = 60000
token_limit = 8192
side_effect_policy = "sandboxed"

# The apxm-os answer ABI: one JSON-encoded { question, agent_context } envelope
# in; the rendered answer is returned as content (the dispatcher accepts content
# when no `answer` token is present), so this skill is prompt-only.
artifact_hash = "blake3:6101b92bf89cef973804dad2831586e60339b5f0dfbc6720b20fc14bbefb6c68"
[[inputs]]
name = "payload"
type = "string"
description = "JSON-encoded { question, agent_context } envelope from apxm-os."
required = true

[[outputs]]
name = "answer"
type = "string"
description = "The rendered answer grounded in the agent's beliefs."
