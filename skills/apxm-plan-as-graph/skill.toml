skill_id = "apxm-plan-as-graph"
version = "0.1.0"
display_name = "APXM Plan as Graph"
description = "Emit a typed APXM AIR graph for complex agent work, then compile and dispatch it through APXM."
entry_flow = "apxm_plan_as_graph"
required_capabilities = ["plan_emission_v1"]
timeout_ms = 300000
token_limit = 32768
side_effect_policy = "sandboxed"

[[inputs]]
name = "task"
type = "string"
description = "Natural-language task to turn into an APXM execution graph."
required = true

[[inputs]]
name = "context"
type = "string"
description = "Optional compact repository or session context."
required = false

[[outputs]]
name = "summary"
type = "json"
description = "Summary result plus trace_id; full trace is fetched separately."
